name: Docker Publish

on:
  # 定时检查上游 Paseo 仓库是否有新版本发布
  schedule:
    # 每天 UTC 0:00 检查（北京时间 8:00）
    - cron: '0 0 * * *'

  # 手动触发
  workflow_dispatch:
    inputs:
      paseo_version:
        description: 'Paseo version to build (e.g. v0.1.107). Leave empty to auto-detect latest.'
        required: false
        default: ''
      force_rebuild:
        description: 'Force rebuild even if version unchanged?'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: pikapeek/paseo

jobs:
  check-and-build:
    name: Check Paseo Release & Build Docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      paseo_version: ${{ steps.version.outputs.paseo_version }}
      should_build: ${{ steps.version.outputs.should_build }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------------------------------
      # Step 1: 获取上游 Paseo 最新发布版本
      # -------------------------------------------------
      - name: Fetch latest Paseo release
        id: fetch_release
        shell: bash
        run: |
          set -euo pipefail

          # 如果手动指定了版本，使用指定版本
          if [[ -n "${{ github.event.inputs.paseo_version || '' }}" ]]; then
            VERSION="${{ github.event.inputs.paseo_version }}"
            echo "Using manually specified version: ${VERSION}"
          else
            # 调用 GitHub API 获取最新 release
            API_URL="https://api.github.com/repos/getpaseo/paseo/releases/latest"
            echo "Fetching latest Paseo release from: ${API_URL}"

            RELEASE_JSON=$(curl -sSf -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${API_URL}")

            VERSION=$(echo "${RELEASE_JSON}" | jq -r '.tag_name')

            if [[ -z "${VERSION}" || "${VERSION}" == "null" ]]; then
              echo "ERROR: Failed to fetch Paseo release version." >&2
              exit 1
            fi
          fi

          echo "Latest Paseo version: ${VERSION}"
          echo "paseo_version=${VERSION}" >> "${GITHUB_OUTPUT}"

      # -------------------------------------------------
      # Step 2: 判断是否需要构建（避免重复构建同一版本）
      # -------------------------------------------------
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if build is needed
        id: version
        shell: bash
        run: |
          set -euo pipefail

          PASEO_VERSION="${{ steps.fetch_release.outputs.paseo_version }}"
          FORCE_REBUILD="${{ github.event.inputs.force_rebuild || 'false' }}"

          echo "paseo_version=${PASEO_VERSION}" >> "${GITHUB_OUTPUT}"

          # 强制重建
          if [[ "${FORCE_REBUILD}" == "true" ]]; then
            echo "Force rebuild enabled."
            echo "should_build=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # 检查 ghcr.io 上是否已存在相同版本的镜像
          IMAGE_TAG="${REGISTRY}/${{ env.IMAGE_NAME }}:${PASEO_VERSION}"

          if docker manifest inspect "${IMAGE_TAG}" &> /dev/null; then
            echo "Image ${IMAGE_TAG} already exists. Skipping build."
            echo "should_build=false" >> "${GITHUB_OUTPUT}"
          else
            echo "Image ${IMAGE_TAG} does not exist. Proceeding with build."
            echo "should_build=true" >> "${GITHUB_OUTPUT}"
          fi

      # -------------------------------------------------
      # Step 3: 构建并推送 Docker 镜像
      # -------------------------------------------------
      - name: Set up Docker Buildx
        if: steps.version.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        if: steps.version.outputs.should_build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.paseo_version }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Paseo + Claude Code
            org.opencontainers.image.description=Pre-installed Paseo and Claude Code with custom API support
            org.opencontainers.image.version=${{ steps.version.outputs.paseo_version }}

      - name: Build and push Docker image
        if: steps.version.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      # -------------------------------------------------
      # Step 4: 构建摘要
      # -------------------------------------------------
      - name: Build summary
        shell: bash
        run: |
          if [[ "${{ steps.version.outputs.should_build }}" == "true" ]]; then
            echo "### 🚀 Paseo + Claude Code Docker Build" >> "${GITHUB_STEP_SUMMARY}"
            echo "" >> "${GITHUB_STEP_SUMMARY}"
            echo "| Item | Value |" >> "${GITHUB_STEP_SUMMARY}"
            echo "|------|-------|" >> "${GITHUB_STEP_SUMMARY}"
            echo "| Paseo Version | \`${{ steps.version.outputs.paseo_version }}\` |" >> "${GITHUB_STEP_SUMMARY}"
            echo "| Image | \`${REGISTRY}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.paseo_version }}\` |" >> "${GITHUB_STEP_SUMMARY}"
            echo "| Image (latest) | \`${REGISTRY}/${{ env.IMAGE_NAME }}:latest\` |" >> "${GITHUB_STEP_SUMMARY}"
            echo "" >> "${GITHUB_STEP_SUMMARY}"
            echo "#### Usage" >> "${GITHUB_STEP_SUMMARY}"
            echo '```bash' >> "${GITHUB_STEP_SUMMARY}"
            echo "docker run -d --name paseo \\" >> "${GITHUB_STEP_SUMMARY}"
            echo "  --restart unless-stopped \\" >> "${GITHUB_STEP_SUMMARY}"
            echo "  -p 6767:6767 \\" >> "${GITHUB_STEP_SUMMARY}"
            echo "  -e PASEO_PASSWORD=change-me \\" >> "${GITHUB_STEP_SUMMARY}"
            echo "  -e GITHUB_TOKEN=ghp_xxx \\" >> "${GITHUB_STEP_SUMMARY}"
            echo "  -e ANTHROPIC_BASE_URL=https://your-api.example.com \\" >> "${GITHUB_STEP_SUMMARY}"
            echo "  -e ANTHROPIC_AUTH_TOKEN=your-token \\" >> "${GITHUB_STEP_SUMMARY}"
            echo "  -e ANTHROPIC_MODEL=your-model \\" >> "${GITHUB_STEP_SUMMARY}"
            echo "  -v /data/workspace:/workspace \\" >> "${GITHUB_STEP_SUMMARY}"
            echo "  -v /data/paseo:/home/paseo \\" >> "${GITHUB_STEP_SUMMARY}"
            echo "  ${REGISTRY}/${{ env.IMAGE_NAME }}:latest" >> "${GITHUB_STEP_SUMMARY}"
            echo '```' >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "### ⏭️ Build Skipped" >> "${GITHUB_STEP_SUMMARY}"
            echo "" >> "${GITHUB_STEP_SUMMARY}"
            echo "Image for Paseo \`${{ steps.version.outputs.paseo_version }}\` already exists." >> "${GITHUB_STEP_SUMMARY}"
          fi
