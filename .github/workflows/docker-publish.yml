name: Docker Publish

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      paseo_version:
        description: 'Paseo version (e.g. v0.1.107). Leave empty to auto-detect.'
        required: false
        default: ''
      force_rebuild:
        description: 'Force rebuild even if version unchanged?'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: pikapeek/paseo

jobs:
  build:
    name: '🔧 Paseo + Claude Code'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    steps:
      # ── Step 1: Checkout ──
      - name: '📥 Checkout'
        uses: actions/checkout@v4

      # ── Step 2: Resolve upstream Paseo version ──
      - name: '🔍 Resolve Paseo version'
        id: fetch
        shell: bash
        run: |
          set -euo pipefail

          echo "::group::Resolving Paseo version"

          MANUAL_VERSION="${{ github.event.inputs.paseo_version || '' }}"

          if [[ -n "${MANUAL_VERSION}" ]]; then
            VERSION="${MANUAL_VERSION}"
            echo "::notice title=Paseo Version::Manually specified: ${VERSION}"
          else
            API_URL="https://api.github.com/repos/getpaseo/paseo/releases/latest"
            echo "  ↳ GET ${API_URL}"
            RELEASE_JSON=$(curl -sSf \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${API_URL}")
            VERSION=$(echo "${RELEASE_JSON}" | jq -r '.tag_name')
            RELEASE_DATE=$(echo "${RELEASE_JSON}" | jq -r '.published_at // "unknown"' | cut -d'T' -f1)

            if [[ -z "${VERSION}" || "${VERSION}" == "null" ]]; then
              echo "::error title=API Error::Failed to fetch latest Paseo release"
              exit 1
            fi

            echo "::notice title=Latest Release::${VERSION} — ${RELEASE_DATE}"
          fi

          echo "paseo_version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "::endgroup::"

      # ── Step 3: Login & dedup check ──
      - name: '🔐 Login to GHCR'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: '🧪 Check if build is needed'
        id: check
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.fetch.outputs.paseo_version }}"
          FORCE="${{ github.event.inputs.force_rebuild || 'false' }}"
          IMAGE="${REGISTRY}/${{ env.IMAGE_NAME }}:${VERSION}"

          echo "::group::🔍 Checking ${IMAGE}"

          # Always pass version downstream
          echo "paseo_version=${VERSION}" >> "${GITHUB_OUTPUT}"

          if [[ "${FORCE}" == "true" ]]; then
            echo "::warning title=Force Rebuild::Skipping dedup check"
            echo "should_build=true" >> "${GITHUB_OUTPUT}"
            echo "  → Decision: BUILD (forced)"
            echo "::endgroup::"
            exit 0
          fi

          if docker manifest inspect "${IMAGE}" &> /dev/null; then
            echo "::notice title=Skipped::${IMAGE} already exists"
            echo "should_build=false" >> "${GITHUB_OUTPUT}"
            echo "  → Decision: SKIP"
          else
            echo "::notice title=New Version::${VERSION} — will publish"
            echo "should_build=true" >> "${GITHUB_OUTPUT}"
            echo "  → Decision: BUILD"
          fi

          echo "::endgroup::"

      # ── Step 4: Build & Push (only when needed) ──
      - name: '🐳 Setup Buildx'
        if: steps.check.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: '🏷  Generate tags'
        if: steps.check.outputs.should_build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.check.outputs.paseo_version }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Paseo + Claude Code
            org.opencontainers.image.description=Paseo daemon + Claude Code + gh CLI
            org.opencontainers.image.version=${{ steps.check.outputs.paseo_version }}

      - name: '🚀 Build & Push'
        if: steps.check.outputs.should_build == 'true'
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      # ── Step 5: Report ──
      - name: '📋 Summary'
        if: always()
        shell: bash
        run: |
          VERSION="${{ steps.fetch.outputs.paseo_version }}"
          SHOULD_BUILD="${{ steps.check.outputs.should_build || 'false' }}"
          IMAGE="${REGISTRY}/${{ env.IMAGE_NAME }}"

          if [[ "${SHOULD_BUILD}" == "true" ]]; then
            echo "### 🚀 Published" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "### ⚡ Skipped" >> "${GITHUB_STEP_SUMMARY}"
          fi

          cat << EOF >> "${GITHUB_STEP_SUMMARY}"
| Paseo | Image |
|---|---|
| \`${VERSION}\` | \`${IMAGE}:${VERSION}\` |
EOF
