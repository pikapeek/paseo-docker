name: Docker Publish

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      paseo_version:
        description: 'Paseo version (e.g. v0.1.107). Leave empty to auto-detect.'
        required: false
        default: ''
      force_rebuild:
        description: 'Force rebuild even if version unchanged?'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: pikapeek/paseo

jobs:
  build:
    name: '🔧 Paseo + Claude Code'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    steps:
      - name: '📥 Checkout'
        uses: actions/checkout@v4

      - name: '🔍 Resolve Paseo version'
        id: fetch
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Resolving Paseo version"
          MANUAL_VERSION="${{ github.event.inputs.paseo_version || '' }}"
          if [[ -n "${MANUAL_VERSION}" ]]; then
            VERSION="${MANUAL_VERSION}"
            echo "::notice title=Paseo Version::Manually specified: ${VERSION}"
          else
            API_URL="https://api.github.com/repos/getpaseo/paseo/releases/latest"
            echo "  ↳ GET ${API_URL}"
            RELEASE_JSON=$(curl -sSf -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "${API_URL}")
            VERSION=$(echo "${RELEASE_JSON}" | jq -r '.tag_name')
            if [[ -z "${VERSION}" || "${VERSION}" == "null" ]]; then
              echo "::error title=API Error::Failed to fetch latest Paseo release"
              exit 1
            fi
            echo "  ↳ Latest release: ${VERSION}"
          fi
          echo "paseo_version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "::endgroup::"

      - name: '🔐 Login to GHCR'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: '🧪 Check if build is needed'
        id: check
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.fetch.outputs.paseo_version }}"
          FORCE="${{ github.event.inputs.force_rebuild || 'false' }}"
          IMAGE="${REGISTRY}/${IMAGE_NAME}:${VERSION}"
          echo "paseo_version=${VERSION}" >> "${GITHUB_OUTPUT}"
          if [[ "${FORCE}" == "true" ]]; then
            echo "::warning title=Force::Skipping dedup check — ${IMAGE}"
            echo "should_build=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if docker manifest inspect "${IMAGE}" &> /dev/null; then
            echo "::notice title=Skipped::Already exists — ${IMAGE}"
            echo "should_build=false" >> "${GITHUB_OUTPUT}"
          else
            echo "::notice title=Build::Will publish ${IMAGE}"
            echo "should_build=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: '🐳 Setup Buildx'
        if: steps.check.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: '🏷  Generate tags'
        if: steps.check.outputs.should_build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.check.outputs.paseo_version }}
            type=raw,value=latest

      - name: '🚀 Build & Push'
        if: steps.check.outputs.should_build == 'true'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: '📋 Summary'
        if: always()
        shell: bash
        run: |
          VERSION="${{ steps.fetch.outputs.paseo_version }}"
          SHOULD_BUILD="${{ steps.check.outputs.should_build || 'false' }}"
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          if [[ "${SHOULD_BUILD}" == "true" ]]; then
            echo "### 🚀 Published" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "### ⚡ Skipped" >> "${GITHUB_STEP_SUMMARY}"
          fi
          {
            echo "| Paseo | Image |"
            echo "| --- | --- |"
            echo "| \`${VERSION}\` | \`${IMAGE}:${VERSION}\` |"
          } >> "${GITHUB_STEP_SUMMARY}"
